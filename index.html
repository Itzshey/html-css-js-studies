<!DOCTYPE html>
<!-- DOCTYPE representa o tipo de documento e ajuda o browser a mostrar a pagina 
 corretamente. So uma vez e em cima de qualquer tag html. -->
 <html>
    <!-- A tag html e onde o projeto sera incluido. -->
     <head>
        <title> Titulo da pagina :D </title>
        <meta name="descprition" content="A descricao que aparece no chrome">
     </head>
     <!-- A tag head contem informacoes como o titulo da aba, e a descricao da pagina antes de se
      abrir ela. Sao coisas de fora da pagina. Metadados. -->
     <body>
        <header>
             <!-- O cabecalho da pagina. -->
             <h1> Titulo principal H1 </h1>
             <!-- No HTML e uma boa pratica usar somente um H1 por pagina-->
             <h2> Titulo secundario H2</h2>
             <!-- Para titulos, tem do H1 ao H6-->
        </header>

        <main>
            <!-- Conteudo principal. -->
             <section>
                <!-- Uma parte do conteudo principal.-->
                 <p> Um paragrafo e usado dessa forma. </p>
                 <p> Usando a tag <strong> strong. </strong> voce deixa o texto destacado. </p>
                 <p> Para deixar em <em>italico</em> se usa a tag em. </p>
                 <p> Para pular uma linha <br> se usa a tag br</p>
                 <p> Quando for fazer uma abreviacao se usa a tag abbr.<br> 
                    EX: <abbr title="HyperText Markup Language">HTML</abbr></p>
        </main>

        <footer>
            <!-- O rodape da pagina.-->
        </footer>
        <!-- Tudo que esta dentro do body sera exposto na pagina.
         As tags header, main e footer sao tags semanticas, com o intuito de separar cada area da pagina. -->
         
     </body>
    
 </html>
